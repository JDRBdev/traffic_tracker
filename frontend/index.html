<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Traffic Monitor Dashboard</title>
    
    <!-- Fallback Font for Windows -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Apple Color System */
            --primary: #0066cc;
            --primary-focus: #0071e3;
            --primary-on-dark: #2997ff;
            --ink: #1d1d1f;
            --body: #1d1d1f;
            --body-on-dark: #ffffff;
            --body-muted: #cccccc;
            --ink-muted-80: #333333;
            --ink-muted-48: #7a7a7a;
            --divider-soft: #f0f0f0;
            --hairline: #e0e0e0;
            --canvas: #ffffff;
            --canvas-parchment: #f5f5f7;
            --surface-pearl: #fafafc;
            --surface-tile-1: #272729;
            --surface-tile-2: #2a2a2c;
            --surface-tile-3: #252527;
            --surface-black: #000000;
            --surface-chip-translucent: rgba(210, 210, 215, 0.64);
            
            /* Custom */
            --pink: #ec4899;

            /* Radii */
            --radius-none: 0px;
            --radius-xs: 5px;
            --radius-sm: 8px;
            --radius-md: 11px;
            --radius-lg: 18px;
            --radius-pill: 9999px;
            --radius-full: 50%;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            background-color: var(--canvas-parchment);
            color: var(--ink);
            font-family: "SF Pro Text", "Inter", system-ui, -apple-system, sans-serif;
            font-feature-settings: "ss03" 1; /* Inter rounded 'a' */
            font-size: 17px;
            font-weight: 400;
            line-height: 1.47;
            letter-spacing: -0.374px;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Typography */
        .display-lg {
            font-family: "SF Pro Display", "Inter", system-ui, -apple-system, sans-serif;
            font-size: 40px;
            font-weight: 600;
            line-height: 1.1;
            letter-spacing: 0;
        }

        .tagline {
            font-family: "SF Pro Display", "Inter", system-ui, -apple-system, sans-serif;
            font-size: 21px;
            font-weight: 600;
            line-height: 1.19;
            letter-spacing: 0.231px;
        }

        .body-strong {
            font-weight: 600;
            line-height: 1.24;
            letter-spacing: -0.374px;
        }

        .caption {
            font-size: 14px;
            font-weight: 400;
            line-height: 1.43;
            letter-spacing: -0.224px;
        }

        .nav-link {
            font-size: 12px;
            font-weight: 400;
            line-height: 1.0;
            letter-spacing: -0.12px;
        }

        /* Navigations */
        .global-nav {
            height: 44px;
            background-color: var(--surface-black);
            color: var(--body-on-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }

        .sub-nav-frosted {
            height: 52px;
            background-color: rgba(245, 245, 247, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--hairline);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* Buttons */
        .btn {
            font-family: "SF Pro Text", "Inter", system-ui, -apple-system, sans-serif;
            cursor: pointer;
            transition: transform 0.1s ease;
            border: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            box-sizing: border-box;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-primary {
            background-color: var(--primary);
            color: #ffffff;
            font-size: 17px;
            font-weight: 400;
            padding: 11px 22px;
            border-radius: var(--radius-pill);
        }

        .btn-primary:focus-visible {
            outline: 2px solid var(--primary-focus);
            outline-offset: 2px;
        }

        .btn-secondary-pill {
            background-color: transparent;
            color: var(--primary);
            font-size: 17px;
            font-weight: 400;
            padding: 10px 21px; /* 1px less to account for border */
            border-radius: var(--radius-pill);
            border: 1px solid var(--primary);
        }

        .btn-dark-utility {
            background-color: var(--ink);
            color: var(--body-on-dark);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: -0.224px;
            padding: 8px 15px;
            border-radius: var(--radius-sm);
        }

        /* Layout */
        main {
            flex: 1;
            display: flex;
            gap: 32px;
            padding: 48px 40px;
            max-width: 1440px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
        }

        /* Cards */
        .store-utility-card {
            background-color: var(--canvas);
            border-radius: var(--radius-lg);
            padding: 24px;
            border: 1px solid var(--hairline);
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }

        .video-container {
            flex: 3.5;
            padding: 12px; /* reduced padding to maximize video size */
            align-items: center;
            justify-content: center;
        }

        .video-frame {
            width: 100%;
            max-width: 100%;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: rgba(0,0,0,0.22) 3px 5px 30px 0;
            background-color: var(--surface-black);
            position: relative;
            line-height: 0;
        }

        canvas {
            width: 100%;
            height: auto;
            aspect-ratio: 16/9;
            object-fit: cover;
            cursor: default;
            display: block;
        }

        canvas.editing {
            cursor: crosshair;
        }

        .stats-panel {
            flex: 1;
            min-width: 280px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .stat-card {
            color: var(--ink);
        }

        .stat-value {
            margin-top: 8px;
        }

        .stat-value.blue { color: var(--primary); }
        .stat-value.green { color: #10b981; }

        .controls-card {
            margin-top: auto;
            gap: 12px;
        }

        #pink-badge {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--pink);
            color: #ffffff;
            padding: 8px 16px;
            border-radius: var(--radius-pill);
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 6px 18px rgba(236,72,153,0.18);
            opacity: 0;
            visibility: hidden;
            transition: all 0.28s ease;
            z-index: 10;
        }

        #pink-badge.visible {
            opacity: 1;
            visibility: visible;
        }

        .instructions {
            margin-top: 8px;
            color: var(--ink-muted-80);
            display: none;
        }
        
        .instructions.visible {
            display: block;
        }

        @media (max-width: 1068px) {
            main {
                flex-direction: column;
                padding: 24px;
            }
        }
    </style>
</head>
<body>
    <header class="global-nav">
        <div class="nav-link">Traffic Monitor</div>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="nav-link" style="color: var(--body-muted);">Live via YOLOv8</div>
            <button class="btn btn-dark-utility">Live</button>
        </div>
    </header>

    <div class="sub-nav-frosted">
        <div class="tagline" style="color: var(--ink);">Dashboard</div>
        <div class="caption" style="color: var(--ink-muted-80);">Stream: YOLOv8</div>
    </div>

    <main>
        <div class="store-utility-card video-container">
            <div class="video-frame">
                <div id="pink-badge">🚗 ¡Vehículo Rosa Detectado!</div>
                <canvas id="video-canvas"></canvas>
            </div>
        </div>

        <div class="stats-panel">
            <div class="store-utility-card stat-card">
                <div class="body-strong" style="color: var(--ink-muted-80);">Vehículos en Frame</div>
                <div class="display-lg stat-value blue" id="val-vehicles">0</div>
            </div>
            
            <div class="store-utility-card stat-card">
                <div class="body-strong" style="color: var(--ink-muted-80);">Peatones en ROI (Paso)</div>
                <div class="display-lg stat-value green" id="val-pedestrians">0</div>
            </div>

            <div class="store-utility-card controls-card">
                <div class="body-strong" style="margin-bottom: 8px;">Configuración de ROI</div>
                <button class="btn btn-secondary-pill" id="btn-edit">Editar Paso de Peatones</button>
                <button class="btn btn-primary" id="btn-save" style="display: none; width: 100%;">Guardar</button>
                <button class="btn btn-secondary-pill" id="btn-cancel" style="display: none; width: 100%;">Cancelar</button>
                
                <div class="caption instructions" id="edit-instructions">
                    Haz click sobre el vídeo para definir los vértices del polígono (mínimo 3). 
                    Los vértices se conectarán automáticamente.
                </div>
            </div>
        </div>
    </main>

    <script>
        const canvas = document.getElementById('video-canvas');
        const ctx = canvas.getContext('2d');
        const valVehicles = document.getElementById('val-vehicles');
        const valPedestrians = document.getElementById('val-pedestrians');
        const pinkBadge = document.getElementById('pink-badge');
        
        const btnEdit = document.getElementById('btn-edit');
        const btnSave = document.getElementById('btn-save');
        const btnCancel = document.getElementById('btn-cancel');
        const instructions = document.getElementById('edit-instructions');

        let ws = null;
        let pinkHideTimeout = null;
        let isEditing = false;
        let editedPolygon = [];
        let currentFrameImg = null;

        // Connect WebSocket
        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${protocol}//${window.location.host}/ws`;
            ws = new WebSocket(wsUrl);

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                
                // Update stats
                valVehicles.textContent = data.vehicle_count;
                valPedestrians.textContent = data.pedestrian_in_roi;

                // Handle pink badge
                if (data.pink_detected) {
                    pinkBadge.classList.add('visible');
                    if (pinkHideTimeout) clearTimeout(pinkHideTimeout);
                    pinkHideTimeout = setTimeout(() => {
                        pinkBadge.classList.remove('visible');
                    }, 5000);
                }

                // Render frame
                if (data.frame) {
                    const img = new Image();
                    img.onload = () => {
                        // Set canvas dimensions to match image source
                        if (canvas.width !== img.width || canvas.height !== img.height) {
                            canvas.width = img.width;
                            canvas.height = img.height;
                        }
                        currentFrameImg = img;
                        renderCanvas();
                    };
                    img.src = 'data:image/jpeg;base64,' + data.frame;
                }
            };

            ws.onclose = () => {
                console.log("WebSocket disconnected. Reconnecting in 2s...");
                setTimeout(connect, 2000);
            };
        }

        function renderCanvas() {
            if (!currentFrameImg) return;
            
            // Draw the current video frame
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.drawImage(currentFrameImg, 0, 0, canvas.width, canvas.height);

            // If we are editing, overlay the custom polygon
            if (isEditing && editedPolygon.length > 0) {
                ctx.beginPath();
                ctx.moveTo(editedPolygon[0][0], editedPolygon[0][1]);
                for (let i = 1; i < editedPolygon.length; i++) {
                    ctx.lineTo(editedPolygon[i][0], editedPolygon[i][1]);
                }
                if (editedPolygon.length >= 3) {
                    ctx.closePath();
                    ctx.fillStyle = 'rgba(236, 72, 153, 0.3)'; // Pink overlay
                    ctx.fill();
                }
                ctx.strokeStyle = '#ec4899';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw vertices
                ctx.fillStyle = '#fff';
                for (const pt of editedPolygon) {
                    ctx.beginPath();
                    ctx.arc(pt[0], pt[1], 4, 0, 2 * Math.PI);
                    ctx.fill();
                }
            }
        }

        // Canvas Click Handler (for ROI editing)
        canvas.addEventListener('click', (e) => {
            if (!isEditing || !currentFrameImg) return;

            const rect = canvas.getBoundingClientRect();
            // Calculate scale between displayed size and actual internal canvas size
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            const x = Math.round((e.clientX - rect.left) * scaleX);
            const y = Math.round((e.clientY - rect.top) * scaleY);

            editedPolygon.push([x, y]);
            renderCanvas();
        });

        // ROI Controls
        btnEdit.addEventListener('click', () => {
            isEditing = true;
            editedPolygon = [];
            canvas.classList.add('editing');
            
            btnEdit.style.display = 'none';
            btnSave.style.display = 'inline-flex';
            btnCancel.style.display = 'inline-flex';
            instructions.classList.add('visible');
        });

        btnCancel.addEventListener('click', () => {
            isEditing = false;
            editedPolygon = [];
            canvas.classList.remove('editing');
            
            btnEdit.style.display = 'inline-flex';
            btnSave.style.display = 'none';
            btnCancel.style.display = 'none';
            instructions.classList.remove('visible');
        });

        btnSave.addEventListener('click', async () => {
            if (editedPolygon.length < 3) {
                alert('El polígono debe tener al menos 3 vértices.');
                return;
            }

            try {
                const response = await fetch('/config/roi', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ polygon: editedPolygon })
                });
                
                if (response.ok) {
                    // Success
                    isEditing = false;
                    canvas.classList.remove('editing');
                    btnEdit.style.display = 'inline-flex';
                    btnSave.style.display = 'none';
                    btnCancel.style.display = 'none';
                    instructions.classList.remove('visible');
                } else {
                    alert('Error al guardar el ROI.');
                }
            } catch (err) {
                console.error(err);
                alert('Error de conexión al guardar.');
            }
        });

        // Init
        connect();
        
        // Add a dummy test image to show canvas bounds if ws is not immediately ready
        ctx.fillStyle = '#1e293b';
        ctx.fillRect(0, 0, canvas.width || 640, canvas.height || 480);
    </script>
</body>
</html>
